<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Favorites - N3M|Nest</title>
    <link rel="icon" type="image/png" href="../../../Assets/Images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block"
        rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Use FontAwesome for compatibility with existing JS icons if needed, though we prefer Material Symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../../Assets/tailwind.css">
    <style>
        :root {
            --color-background-dark: 15 32 35;
            --color-surface-dark: 18 18 18;
        }

        .nav-dropdown { position: relative; }
        .nav-dropdown-trigger {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 12px;
            font-family: 'Xirod', sans-serif !important; font-size: 10px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s ease; border: none; background: transparent;
            color: #94a3b8; white-space: nowrap;
        }
        .nav-dropdown-trigger.active { color: #4a7dff; background: rgba(74,125,255,0.1); }
        .nav-dropdown-trigger:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-dropdown-trigger.active:hover { background: rgba(74,125,255,0.2); }
        .nav-chevron { font-size: 14px; transition: transform 0.25s ease; opacity: 0.6; }
        .nav-dropdown:hover .nav-chevron { transform: rotate(180deg); opacity: 1; }
        .nav-dropdown-menu {
            position: absolute; top: 100%; left: 0; padding-top: 8px;
            min-width: 160px; opacity: 0; pointer-events: none;
            transform: translateY(-6px); transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100;
        }
        .nav-dropdown:hover .nav-dropdown-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .nav-dropdown-menu-inner {
            background: rgba(10,22,24,0.96); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; backdrop-filter: blur(16px); padding: 6px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .nav-dropdown-menu a {
            display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 7px;
            font-family: 'Xirod', sans-serif !important; font-size: 10px; letter-spacing: 1px;
            color: #94a3b8; text-decoration: none; transition: all 0.15s ease;
        }
        .nav-dropdown-menu a:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .nav-dropdown-menu a.active { color: #4a7dff; background: rgba(74,125,255,0.12); }
    </style>
    <link rel="stylesheet" href="../Css/favorites.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-200 font-body h-screen flex flex-col overflow-hidden">

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <!-- Premium Dynamic Background -->
        <div class="bg-mesh-container">
            <div class="bg-blob blob-1"></div>
            <div class="bg-blob blob-2"></div>
            <div class="bg-blob blob-3"></div>
            <div class="bg-grain"></div>
            <div class="bg-vignette"></div>
        </div>

        <!-- Top Bar Navigation -->
        <header
            class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-[#0a1618]/90 backdrop-blur-xl sticky top-0 z-50">
            <!-- Left: Brand & Main Nav -->
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-3">
                    <img src="../../../Assets/Images/logo.png" alt="Logo" class="h-7 w-7 object-contain">
                    <span class="neon-xirod font-bold text-base tracking-widest hidden sm:block">
                        N3M<span class="mx-0.5 flicker-pipe">|</span>Nest
                    </span>
                </div>

                <nav id="top-nav" class="hidden xl:flex items-center gap-1">
                    <!-- Discover / Catalog dropdown -->
                    <div class="nav-dropdown">
                        <button class="nav-dropdown-trigger" id="nav-browse-trigger">
                            <span class="material-symbols-outlined" style="font-size:16px">explore</span>
                            <span id="nav-browse-label">DISCOVER</span>
                            <span class="material-symbols-outlined nav-chevron">expand_more</span>
                        </button>
                        <div class="nav-dropdown-menu">
                            <div class="nav-dropdown-menu-inner">
                                <a href="../../../Discover/Html/discover.html" id="nav-discover">
                                    <span class="material-symbols-outlined" style="font-size:15px">explore</span>
                                    DISCOVER
                                </a>
                                <a href="../../../Dashboard/Html/dashboard.html" id="nav-catalog">
                                    <span class="material-symbols-outlined" style="font-size:15px">dashboard</span>
                                    CATALOG
                                </a>
                            </div>
                        </div>
                    </div>
                    <a href="../../Library/Html/library.html" id="nav-library"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">stadia_controller</span> LIBRARY
                    </a>
                    <a href="javascript:void(0)" id="nav-favorites"
                        class="nav-item active flex items-center gap-2 px-4 py-2 rounded-xl text-primary bg-primary/10 text-[10px] xirod-font hover:bg-primary/20 transition-all">
                        <span class="material-symbols-outlined text-sm">favorite</span> FAVORITES
                    </a>
                    <a href="../../Wishlist/Html/wishlist.html" id="nav-wishlist"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">bookmark</span> WISHLIST
                    </a>
                    <a href="../../UserCollections/Html/collections.html" id="nav-collections"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">folder_special</span> COLLECTIONS
                    </a>
                </nav>
            </div>

            <!-- Right: Account & Notifications -->
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end">
                        <span id="welcome-username" class="neon-username text-[13px] leading-none mb-1">Gamer</span>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Online</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <a href="../../../Profile/Html/profile.html" class="group relative">
                            <div
                                class="h-11 w-11 rounded-xl bg-gradient-to-tr from-primary to-purple-600 p-[1px] group-hover:scale-105 transition-all">
                                <div
                                    class="h-full w-full rounded-xl bg-[#0a1618] flex items-center justify-center overflow-hidden">
                                    <span id="display-avatar-header"
                                        class="text-sm font-bold text-white uppercase">U</span>
                                </div>
                            </div>
                        </a>

                        <!-- Notification Bell -->
                        <div class="relative" id="notif-wrapper">
                            <button id="notification-btn" onclick="toggleNotifDropdown()"
                                class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-300 hover:text-white hover:border-primary/50 hover:bg-white/10 transition-all group overflow-visible relative">
                                <span
                                    class="material-symbols-outlined text-[20px] relative z-10 transition-transform group-hover:scale-110">notifications</span>
                                <span id="notif-badge"
                                    class="hidden absolute -top-1 -right-1 h-5 w-5 rounded-full bg-primary text-[#080f0f] text-[10px] font-black flex items-center justify-center z-20 shadow-[0_0_8px_rgba(74,125,255,0.8)] animate-pulse">0</span>
                            </button>

                            <!-- Notif Dropdown -->
                            <div id="notif-dropdown"
                                class="hidden absolute top-[calc(100%+12px)] right-0 w-80 bg-[#0a1618]/95 border border-white/10 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] z-[100] overflow-hidden backdrop-blur-2xl">
                                <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
                                    <h3 class="text-[10px] xirod-font text-slate-300 uppercase tracking-widest">Friend
                                        Requests</h3>
                                    <span id="notif-count-label" class="text-[10px] text-slate-500"></span>
                                </div>
                                <div id="notif-list" class="overflow-y-auto max-height-[360px] custom-scrollbar"></div>
                            </div>
                        </div>

                        <button onclick="logout()"
                            class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-red-400 hover:border-red-400/50 hover:bg-red-400/10 transition-all group"
                            title="Logout">
                            <span
                                class="material-symbols-outlined text-[20px] transition-transform group-hover:scale-110">logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div id="games-view" style="background-color: #0a487330;"
            class="content-area flex-1 overflow-y-auto p-6 md:p-8 z-10 relative">

            <!-- Header Section -->
            <div class="mb-10 w-full max-w-5xl mx-auto text-center">
                <h3
                    class="header-title text-4xl font-black text-white mb-2 tracking-tight neon-text-white uppercase italic">
                    Favorites</h3>
                <p id="total-games" class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em]">0 Games
                    favorited
            </div>

            <!-- View Switcher -->
            <div class="relative w-full max-w-5xl mx-auto flex items-center justify-center mb-8 px-4">
                <div
                    class="inline-flex bg-[#0a1618]/60 backdrop-blur-xl p-1 rounded-2xl border border-white/5 shadow-2xl overflow-hidden">
                    <button id="view-grid-btn" onclick="setFavoriteView('grid')"
                        class="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] xirod-font transition-all text-slate-400 hover:text-white hover:bg-white/5">
                        <span class="material-symbols-outlined text-sm">grid_view</span> GRID
                    </button>
                    <button id="view-list-btn" onclick="setFavoriteView('list')"
                        class="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] xirod-font transition-all text-slate-400 hover:text-white hover:bg-white/5">
                        <span class="material-symbols-outlined text-sm">view_list</span> LIST
                    </button>
                    <button id="view-single-btn" onclick="setFavoriteView('single')"
                        class="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] xirod-font transition-all text-slate-400 hover:text-white hover:bg-white/5">
                        <span class="material-symbols-outlined text-sm">view_day</span> SINGLE
                    </button>
                </div>
            </div>



            <!-- Games Grid -->
            <div id="library-games" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-1.5 md:gap-2">
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-500">
                    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4">
                    </div>
                    <p>Loading favorites...</p>
                </div>
            </div>



            <!-- Footer -->
            <footer class="mt-12 py-6 border-t border-[#1e293b] text-center">
                <p class="text-xs text-slate-600">© 2026 N3M Library.</p>
            </footer>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="../../../Assets/vendor/signalr/signalr.min.js"></script>
    <script src="../../../Auth/Js/auth.js"></script>
    <script src="../../../Shared/Js/notifications.js"></script>
    <script src="../Js/favorites.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof isLoggedIn === 'function' && isLoggedIn() && typeof initNotificationSystem === 'function') {
                initNotificationSystem();
            }
        });
    </script>
</body>

</html>
