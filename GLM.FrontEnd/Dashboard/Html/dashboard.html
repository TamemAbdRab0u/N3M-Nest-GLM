<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard - N3M|Nest</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block"
        rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Use FontAwesome for compatibility with existing JS icons if needed, though we prefer Material Symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../Assets/tailwind.css">
    <style>
        @font-face {
            font-family: 'Xirod';
            src: url('../../Assets/Fonts/Xirod.otf') format('opentype');
        }

        .xirod-font {
            font-family: 'Xirod', sans-serif;
            letter-spacing: 1px;
        }

        .neon-xirod {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 5px rgba(74, 125, 255, 0.8),
                0 0 10px rgba(74, 125, 255, 0.5),
                0 0 15px rgba(74, 125, 255, 0.3);
            letter-spacing: 2px;
        }

        .flicker-pipe {
            display: inline-block;
            animation: flicker-bulb 6s linear infinite;
        }

        @keyframes flicker-bulb {

            0%,
            8%,
            10%,
            12%,
            40%,
            42%,
            65%,
            66%,
            68%,
            100% {
                opacity: 1;
                text-shadow: 0 0 4px #fff, 0 0 12px #4a7dff, 0 0 28px #4a7dff;
            }

            9%,
            11%,
            41%,
            67% {
                opacity: 0.08;
                text-shadow: none;
            }

            13%,
            39% {
                opacity: 0.5;
                text-shadow: 0 0 4px #fff;
            }

            64%,
            69% {
                opacity: 0.15;
                text-shadow: none;
            }
        }

        .animate-pop {
            animation: pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1);
            }
        }

        /* High-End Neon Brand Text */
        .neon-text-white {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px #fff,
                0 0 40px #00d2ff,
                0 0 80px #00d2ff;
            font-weight: 200;
            letter-spacing: 0.1em;
        }

        .neon-username {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #4a7dff,
                0 0 40px #4a7dff;
            font-weight: 800;
        }

        /* Toast Animations */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        #search-results-dropdown::-webkit-scrollbar {
            width: 4px;
        }

        #search-results-dropdown::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        #search-results-dropdown::-webkit-scrollbar-thumb {
            background: rgba(74, 125, 255, 0.3);
            border-radius: 10px;
        }

        #search-results-dropdown::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 125, 255, 0.5);
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(110%);
                opacity: 0;
            }
        }

        .toast-slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast-slide-out {
            animation: slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Status Badge Glows */
        .status-badge-fav {
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-badge-lib {
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            background: rgba(34, 197, 94, 0.1);
        }

        .status-badge-wish {
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
            background: rgba(96, 165, 250, 0.1);
        }

        @keyframes badgeEntrance {
            from {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .animate-badge {
            animation: badgeEntrance 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glassmorphism Classes for Game Cards */
        .glass-neon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            transition: all 0.3s ease;
            background: rgba(15, 32, 35, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px -3px rgba(74, 125, 255, 0.3);
        }

        .glass-neon-btn:hover {
            background: rgba(15, 32, 35, 0.6);
            box-shadow: 0 0 20px 2px rgba(74, 125, 255, 0.5);
            transform: translateY(-2px);
            border-color: rgba(74, 125, 255, 0.5);
        }

        .glass-panel {
            background: rgba(15, 32, 35, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Active Filter Effect */
        .active-filter-btn {
            background: rgba(74, 125, 255, 0.25) !important;
            border-color: rgba(74, 125, 255, 0.5) !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(74, 125, 255, 0.2) !important;
        }

        /* Heart Pop Animation */
        @keyframes heart-pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .animate-pop {
            animation: heart-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Premium Dynamic Background */
        .bg-mesh-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #080f0f;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-blob {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            mix-blend-mode: screen;
            animation: blob-float 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            background: radial-gradient(circle, #4a7dff 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation-duration: 30s;
        }

        .blob-2 {
            background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
            bottom: -300px;
            right: -100px;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob-3 {
            background: radial-gradient(circle, #0df2f2 0%, transparent 70%);
            top: 40%;
            left: 30%;
            width: 600px;
            height: 600px;
            animation-duration: 40s;
            animation-delay: -10s;
        }

        @keyframes blob-float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(100px, 150px) scale(1.1);
            }

            66% {
                transform: translate(-50px, 200px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .bg-grain {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 1;
        }

        .bg-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(8, 15, 15, 0.8) 100%);
            z-index: 2;
        }

        /* Skeleton Loading */
        @keyframes skeleton-shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-shimmer {
            background: linear-gradient(90deg, #1a2428 25%, #243338 50%, #1a2428 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.6s infinite linear;
        }

        /* Kinetic Archive: Vertical Search Results */
        #library-games.vertical-search-view {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 4rem;
        }

        .vertical-result-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem;
            background: rgba(29, 32, 38, 0.4);
            /* surface-dark */
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .vertical-result-card:hover {
            background: rgba(39, 42, 49, 0.7);
            /* surface-container-high */
            transform: scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .vertical-result-card .thumb-container {
            width: 240px;
            aspect-ratio: 16/9;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .vertical-result-card .content-container {
            flex: 1;
            min-width: 0;
        }

        .vertical-result-card .action-cluster {
            display: flex;
            gap: 0.75rem;
            margin-left: auto;
        }

        .vertical-result-card .title-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        .vertical-result-card:hover .title-text {
            color: #82cfff;
            /* kinetic-blue */
        }

        .genre-pill {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(130, 207, 255, 0.1);
            color: #82cfff;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Hide header until fonts are loaded — prevents icon/text FOUC on navigation */
        html:not(.fonts-loaded) header {
            opacity: 0;
        }

        html.fonts-loaded header {
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        /* Isolated Search Result Hover Styles */
        .result-item-group:hover h4 {
            color: #4a7dff !important;
        }

        .result-item-group:hover .material-symbols-outlined {
            opacity: 1 !important;
        }
        .nav-dropdown { position: relative; }
        .nav-dropdown-trigger {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 12px;
            font-family: 'Xirod', sans-serif !important; font-size: 10px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s ease; border: none; background: transparent;
            color: #94a3b8; white-space: nowrap;
        }
        .nav-dropdown-trigger.active { color: #4a7dff; background: rgba(74,125,255,0.1); }
        .nav-dropdown-trigger:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-dropdown-trigger.active:hover { background: rgba(74,125,255,0.2); }
        .nav-chevron { font-size: 14px; transition: transform 0.25s ease; opacity: 0.6; }
        .nav-dropdown:hover .nav-chevron { transform: rotate(180deg); opacity: 1; }
        .nav-dropdown-menu {
            position: absolute; top: 100%; left: 0; padding-top: 8px;
            min-width: 160px; opacity: 0; pointer-events: none;
            transform: translateY(-6px); transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100;
        }
        .nav-dropdown:hover .nav-dropdown-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .nav-dropdown-menu-inner {
            background: rgba(10,22,24,0.96); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; backdrop-filter: blur(16px); padding: 6px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .nav-dropdown-menu a {
            display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 7px;
            font-family: 'Xirod', sans-serif !important; font-size: 10px; letter-spacing: 1px;
            color: #94a3b8; text-decoration: none; transition: all 0.15s ease;
        }
        .nav-dropdown-menu a:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .nav-dropdown-menu a.active { color: #4a7dff; background: rgba(74,125,255,0.12); }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-200 font-body h-screen flex flex-col overflow-hidden">

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">

        <!-- Top Bar Navigation (Replaces Sidebar) -->

                            </div>
                        </div>
                    </div>
                    <a href="../../Collections/Library/Html/library.html" id="nav-library"

                    <a href="../../Collections/UserCollections/Html/collections.html" id="nav-collections"

                        <span class="material-symbols-outlined text-sm">folder_special</span> COLLECTIONS

                </nav>

            </div>

            <!-- Right: Account & Notifications -->
            <div class="flex items-center gap-4">
                <!-- Header Search -->

                    <span class="absolute left-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-base">search</span>
                    </span>
                    <input type="text" placeholder="Search games..."

                    <!-- Search Results Dropdown -->

                        <div id="search-results-list" class="flex flex-col py-2">

                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div id="games-view" style="background-color: #0a487330;"
            class="content-area flex-1 overflow-y-auto p-6 md:p-8 z-10 relative scroll-smooth">

            <!-- Search Back Button -->
            <button id="search-back-btn" onclick="clearSearchAndReturn()"
                class="hidden absolute top-8 left-8 flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:bg-white/10 hover:border-primary/50 transition-all group z-[60]">
