<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard - N3M|Nest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Use FontAwesome for compatibility with existing JS icons if needed, though we prefer Material Symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a7dff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#121212",
                        "surface-light": "#ffffff",
                        "input-bg": "#1e292b",
                        "input-border": "#2e616b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        @font-face {
            font-family: 'Xirod';
            src: url('../../Assets/Fonts/Xirod.otf') format('opentype');
        }

        .animate-pop {
            animation: pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        
        /* High-End Neon Brand Text (CSS-Tricks Inspired) */
        .neon-text-cyan {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px #fff,
                0 0 40px #4a7dff,
                0 0 80px #4a7dff,
                0 0 90px #4a7dff,
                0 0 100px #4a7dff,
                0 0 150px #4a7dff;
            font-weight: 900;
        }
        .neon-divider {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #4a7dff,
                0 0 82px #4a7dff;
            opacity: 1;
            animation: flicker 1.5s infinite alternate;
        }
        .neon-text-white {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px #fff,
                0 0 40px #00d2ff,
                0 0 80px #00d2ff;
            font-weight: 200;
            letter-spacing: 0.1em;
        }
        .neon-username {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #4a7dff,
                0 0 40px #4a7dff;
            font-weight: 800;
        }
        .xirod-font {
            font-family: 'Xirod', sans-serif;
        }

        /* Subtle Flicker Effect */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 4px #fff,
                    0 0 11px #fff,
                    0 0 19px #fff,
                    0 0 40px #4a7dff,
                    0 0 80px #4a7dff;
            }
            20%, 24%, 55% {        
                text-shadow: none;
                opacity: 0.5;
            }
        }

        /* Toast Animations */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(110%); opacity: 0; }
        }
        .toast-slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast-slide-out {
            animation: slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Status Badge Glows */
        .status-badge-fav {
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.1);
        }
        .status-badge-lib {
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            background: rgba(34, 197, 94, 0.1);
        }
        
        @keyframes badgeEntrance {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }
        .animate-badge {
            animation: badgeEntrance 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        /* Glassmorphism Classes for Game Cards */
        .glass-neon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            transition: all 0.3s ease;
            background: rgba(15, 32, 35, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px -3px rgba(74, 125, 255, 0.3);
        }
        .glass-neon-btn:hover {
            background: rgba(15, 32, 35, 0.6);
            box-shadow: 0 0 20px 2px rgba(74, 125, 255, 0.5);
            transform: translateY(-2px);
            border-color: rgba(74, 125, 255, 0.5);
        }
        .glass-panel {
            background: rgba(15, 32, 35, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Heart Pop Animation */
        @keyframes heart-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.1); }
        }
        .animate-pop {
            animation: heart-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-200 font-body h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-20 lg:w-64 flex-shrink-0 bg-[#0a1618] border-r border-[#1e293b] flex flex-col transition-all duration-300 z-20">
        <!-- Logo -->
        <div class="h-16 flex items-center justify-center lg:justify-start lg:px-6 border-b border-[#1e293b]">
            <div class="h-8 w-8 relative">
                <img src="../../Assets/Images/logo.png" alt="Logo" class="h-full w-full object-contain">
            </div>
            <span class="hidden lg:block ml-3 font-bold text-lg tracking-wide">
                <span class="neon-text-cyan">N3M</span><span class="neon-divider text-xl mx-0.5">|</span><span class="neon-text-white">Nest</span>
            </span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 overflow-y-auto py-6 flex flex-col gap-2 px-3">
            <a href="javascript:void(0)" onclick="selectView('catalog')" id="nav-catalog" class="nav-item active flex items-center gap-3 px-3 py-3 rounded-lg bg-primary/10 text-primary transition-colors group">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="hidden lg:block font-medium">Dashboard</span>
            </a>
            <a href="javascript:void(0)" onclick="selectView('library')" id="nav-library" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e293b] transition-colors group">
                <span class="material-symbols-outlined">stadia_controller</span>
                <span class="hidden lg:block font-medium">My Library</span>
            </a>
            <a href="javascript:void(0)" onclick="selectView('favorites')" id="nav-favorites" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e293b] transition-colors group">
                <span class="material-symbols-outlined">favorite</span>
                <span class="hidden lg:block font-medium">Favorites</span>
            </a>
            <a href="javascript:void(0)" onclick="selectView('discover')" id="nav-discover" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e293b] transition-colors group">
                <span class="material-symbols-outlined">explore</span>
                <span class="hidden lg:block font-medium">Discover</span>
            </a>
            <a href="javascript:void(0)" onclick="selectView('community')" id="nav-community" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e293b] transition-colors group">
                <span class="material-symbols-outlined">group</span>
                <span class="hidden lg:block font-medium">Community</span>
            </a>
             <div class="my-2 border-t border-[#1e293b]"></div>
            <a href="javascript:void(0)" onclick="selectView('settings')" id="nav-settings" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e293b] transition-colors group">
                <span class="material-symbols-outlined">settings</span>
                <span class="hidden lg:block font-medium">Settings</span>
            </a>
        </nav>

        <!-- User Profile (Bottom Sidebar) -->
        <div class="p-4 border-t border-[#1e293b]">
            <div class="user-profile flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-primary to-purple-500 flex items-center justify-center text-white font-bold shadow-lg">
                    <span id="display-avatar">U</span>
                </div>
                <div class="hidden lg:block overflow-hidden">
                    <p id="display-username" class="text-xs xirod-font text-white truncate">User</p>
                    <p class="text-xs text-slate-400 truncate">Online</p>
                </div>
                <button onclick="logout()" class="ml-auto text-slate-400 hover:text-error transition-colors lg:block hidden" title="Logout">
                    <span class="material-symbols-outlined text-[20px]">logout</span>
                </button>
            </div>
            <!-- Mobile Logout (only icon) -->
            <button onclick="logout()" class="lg:hidden mt-4 w-full flex justify-center text-slate-400 hover:text-error">
                 <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0 pointer-events-none">
             <div class="absolute inset-0 bg-[#0f2023]/90 z-10"></div>
             <img src="../../Assets/Images/Bg1.jpg" class="w-full h-full object-cover opacity-40">
        </div>

        <!-- Top Bar -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-[#1e293b] bg-[#0a1618]/80 backdrop-blur-md sticky top-0 z-20">
            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                Welcome back, <span id="welcome-username" class="neon-username">Gamer</span>
            </h2>
            
            <div class="flex items-center gap-4">
                <button class="p-2 text-slate-400 hover:text-white transition-colors relative">
                    <span class="material-symbols-outlined">notifications</span>
                    <span class="absolute top-2 right-2 h-2 w-2 rounded-full bg-red-500 border border-[#0a1618]"></span>
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="content-area flex-1 overflow-y-auto p-6 md:p-8 z-10 relative scroll-smooth">
            
            <!-- Centered Header Section -->
            <div class="mb-10 flex flex-col items-center justify-center text-center">
                <h3 class="header-title text-4xl font-black text-white mb-2 tracking-tight">Catalog Games</h3>
                <p id="total-games" class="text-slate-500 font-medium mb-8">0 Games</p>

                <div class="flex flex-col md:flex-row items-center gap-4 w-full max-w-3xl">
                    <!-- Centered Search -->
                    <div class="relative flex-1 search-bar w-full">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                            <span class="material-symbols-outlined text-[22px]">search</span>
                        </span>
                        <input type="text" placeholder="Search your library..." class="h-12 w-full rounded-2xl bg-[#1e292b]/60 backdrop-blur-md border border-[#2e616b]/30 pl-12 pr-4 text-sm text-white focus:ring-2 focus:ring-primary/50 focus:bg-[#1e292b] transition-all placeholder-slate-500 shadow-xl">
                    </div>

                    <!-- Filters -->
                    <div class="flex gap-1 p-1.5 bg-[#1e292b]/60 backdrop-blur-md border border-[#2e616b]/30 rounded-2xl shadow-xl shrink-0">
                        <button class="px-6 py-2 rounded-xl bg-primary text-white font-semibold shadow-md transition-all active-filter">All</button>
                        <button class="px-6 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-[#2d3b3e] transition-all font-medium">Favorites</button>
                        <button class="px-6 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-[#2d3b3e] transition-all font-medium">Installed</button>
                    </div>
                </div>
            </div>

            <!-- Games Grid -->
            <div id="library-games" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Game Cards will be injected here by dashboard.js -->
                 <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-500">
                    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p>Loading your library...</p>
                 </div>
            </div>

            <!-- Pagination -->
            <div id="pagination-controls" class="mt-8 flex justify-center items-center gap-4">
                <button id="prev-btn" class="h-10 px-4 rounded-lg bg-[#1e292b] border border-[#333333] hover:bg-[#253235] text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">arrow_back</span> Previous
                </button>
                <span id="page-info" class="text-slate-400 font-mono text-sm">Page 1 of 1</span>
                <button id="next-btn" class="h-10 px-4 rounded-lg bg-[#1e292b] border border-[#333333] hover:bg-[#253235] text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
                    Next <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>

            <!-- Footer -->
            <footer class="mt-12 py-6 border-t border-[#1e293b] text-center">
                <p class="text-xs text-slate-600">© 2026 N3M Library. Game data provided by RAWG.</p>
            </footer>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="../../Auth/Js/auth.js"></script>
    <script src="../Js/dashboard.js"></script>
</body>
</html>
