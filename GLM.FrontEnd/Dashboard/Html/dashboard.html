<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard - N3M|Nest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Use FontAwesome for compatibility with existing JS icons if needed, though we prefer Material Symbols -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a7dff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#121212",
                        "surface-light": "#ffffff",
                        "input-bg": "#1e292b",
                        "input-border": "#2e616b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        @font-face {
            font-family: 'Xirod';
            src: url('../../Assets/Fonts/Xirod.otf') format('opentype');
        }

        .xirod-font {
            font-family: 'Xirod', sans-serif;
            letter-spacing: 1px;
        }

        .neon-xirod {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 5px rgba(74, 125, 255, 0.8),
                0 0 10px rgba(74, 125, 255, 0.5),
                0 0 15px rgba(74, 125, 255, 0.3);
            letter-spacing: 2px;
        }

        .flicker-pipe {
            display: inline-block;
            animation: flicker-bulb 6s linear infinite;
        }

        @keyframes flicker-bulb {

            0%,
            8%,
            10%,
            12%,
            40%,
            42%,
            65%,
            66%,
            68%,
            100% {
                opacity: 1;
                text-shadow: 0 0 4px #fff, 0 0 12px #4a7dff, 0 0 28px #4a7dff;
            }

            9%,
            11%,
            41%,
            67% {
                opacity: 0.08;
                text-shadow: none;
            }

            13%,
            39% {
                opacity: 0.5;
                text-shadow: 0 0 4px #fff;
            }

            64%,
            69% {
                opacity: 0.15;
                text-shadow: none;
            }
        }

        .animate-pop {
            animation: pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1);
            }
        }

        /* High-End Neon Brand Text */
        .neon-text-white {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px #fff,
                0 0 40px #00d2ff,
                0 0 80px #00d2ff;
            font-weight: 200;
            letter-spacing: 0.1em;
        }

        .neon-username {
            font-family: 'Xirod', sans-serif;
            color: #fff;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #4a7dff,
                0 0 40px #4a7dff;
            font-weight: 800;
        }

        /* Toast Animations */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(110%);
                opacity: 0;
            }
        }

        .toast-slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast-slide-out {
            animation: slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Status Badge Glows */
        .status-badge-fav {
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-badge-lib {
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            background: rgba(34, 197, 94, 0.1);
        }

        .status-badge-wish {
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
            background: rgba(96, 165, 250, 0.1);
        }

        @keyframes badgeEntrance {
            from {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .animate-badge {
            animation: badgeEntrance 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Glassmorphism Classes for Game Cards */
        .glass-neon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            transition: all 0.3s ease;
            background: rgba(15, 32, 35, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px -3px rgba(74, 125, 255, 0.3);
        }

        .glass-neon-btn:hover {
            background: rgba(15, 32, 35, 0.6);
            box-shadow: 0 0 20px 2px rgba(74, 125, 255, 0.5);
            transform: translateY(-2px);
            border-color: rgba(74, 125, 255, 0.5);
        }

        .glass-panel {
            background: rgba(15, 32, 35, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Active Filter Effect */
        .active-filter-btn {
            background: rgba(74, 125, 255, 0.25) !important;
            border-color: rgba(74, 125, 255, 0.5) !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(74, 125, 255, 0.2) !important;
        }

        /* Heart Pop Animation */
        @keyframes heart-pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .animate-pop {
            animation: heart-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-200 font-body h-screen flex flex-col overflow-hidden">

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        <!-- Background Image with Overlay -->
        <div class="absolute inset-0 z-0 pointer-events-none">
            <div class="absolute inset-0 bg-[#0f2023]/92 z-10"></div>
            <img src="../../Assets/Images/Bg1.jpg" class="w-full h-full object-cover opacity-30">
        </div>

        <!-- Top Bar Navigation (Replaces Sidebar) -->
        <header
            class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-[#0a1618]/90 backdrop-blur-xl sticky top-0 z-50">
            <!-- Left: Brand & Main Nav -->
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-3">
                    <img src="../../Assets/Images/logo.png" alt="Logo" class="h-7 w-7 object-contain">
                    <span class="neon-xirod font-bold text-base tracking-widest hidden sm:block">
                        N3M<span class="mx-0.5 flicker-pipe">|</span>Nest
                    </span>
                </div>

                <nav id="top-nav" class="hidden xl:flex items-center gap-1">
                    <a href="javascript:void(0)" onclick="selectView('catalog')" id="nav-catalog"
                        class="nav-item active flex items-center gap-2 px-4 py-2 rounded-xl text-primary bg-primary/10 text-[10px] xirod-font hover:bg-primary/20 transition-all">
                        <span class="material-symbols-outlined text-sm">dashboard</span> CATALOG
                    </a>
                    <a href="javascript:void(0)" onclick="selectView('library')" id="nav-library"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">stadia_controller</span> LIBRARY
                    </a>
                    <a href="javascript:void(0)" onclick="selectView('favorites')" id="nav-favorites"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">favorite</span> FAVORITES
                    </a>
                    <a href="javascript:void(0)" onclick="selectView('wishlist')" id="nav-wishlist"
                        class="nav-item flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">bookmark</span> WISHLIST
                    </a>
                    <a href="../../Community/Html/community.html"
                        class="flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 text-[10px] xirod-font transition-all">
                        <span class="material-symbols-outlined text-sm">group</span> COMMUNITY
                    </a>
                </nav>

            </div>

            <!-- Right: Account & Notifications -->
            <div class="flex items-center gap-4">
                <!-- Header Search -->
                <div class="hidden lg:flex items-center relative search-bar">
                    <span class="absolute left-3 flex items-center pointer-events-none text-slate-500">
                        <span class="material-symbols-outlined text-base">search</span>
                    </span>
                    <input type="text" placeholder="Search games..."
                        class="h-9 w-48 xl:w-64 rounded-xl bg-white/5 border border-white/10 text-xs text-white pl-10 pr-4 focus:outline-none focus:w-80 transition-all focus:border-primary/50 placeholder-slate-600 bg-black/20">
                </div>

                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end">
                        <span id="welcome-username" class="neon-username text-[13px] leading-none mb-1">Gamer</span>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Online</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <a href="../../Profile/Html/profile.html" class="group relative">
                            <div
                                class="h-11 w-11 rounded-xl bg-gradient-to-tr from-primary to-purple-600 p-[1px] group-hover:scale-105 transition-all">
                                <div
                                    class="h-full w-full rounded-xl bg-[#0a1618] flex items-center justify-center overflow-hidden">
                                    <span id="display-avatar-header"
                                        class="text-sm font-bold text-white uppercase">U</span>
                                </div>
                            </div>
                        </a>

                        <!-- Notification Bell -->
                        <div class="relative" id="notif-wrapper">
                            <button id="notification-btn" onclick="toggleNotifDropdown()"
                                class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-300 hover:text-white hover:border-primary/50 hover:bg-white/10 transition-all group overflow-visible relative">
                                <span
                                    class="material-symbols-outlined text-[20px] relative z-10 transition-transform group-hover:scale-110">notifications</span>
                                <span id="notif-badge"
                                    class="hidden absolute -top-1 -right-1 h-5 w-5 rounded-full bg-primary text-[#080f0f] text-[10px] font-black flex items-center justify-center z-20 shadow-[0_0_8px_rgba(74,125,255,0.8)] animate-pulse">0</span>
                            </button>

                            <!-- Notif Dropdown -->
                            <div id="notif-dropdown"
                                class="hidden absolute top-[calc(100%+12px)] right-0 w-80 bg-[#0a1618]/95 border border-white/10 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] z-[100] overflow-hidden backdrop-blur-2xl">
                                <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
                                    <h3 class="text-[10px] xirod-font text-slate-300 uppercase tracking-widest">Friend
                                        Requests</h3>
                                    <span id="notif-count-label" class="text-[10px] text-slate-500"></span>
                                </div>
                                <div id="notif-list" class="overflow-y-auto max-height-[360px] custom-scrollbar"></div>
                                <div id="notif-empty" class="hidden px-5 py-8 flex flex-col items-center gap-2">
                                    <span
                                        class="material-symbols-outlined text-3xl text-slate-700">notifications_off</span>
                                    <p
                                        class="text-[9px] xirod-font text-slate-600 uppercase tracking-widest text-center">
                                        No pending requests</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="logout()"
                            class="h-10 w-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-red-400 hover:border-red-400/50 hover:bg-red-400/10 transition-all group"
                            title="Logout">
                            <span
                                class="material-symbols-outlined text-[20px] transition-transform group-hover:scale-110">logout</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div id="games-view" class="content-area flex-1 overflow-y-auto p-6 md:p-8 z-10 relative scroll-smooth">

            <!-- Header Section -->
            <div class="mb-10 w-full max-w-5xl mx-auto text-center">
                <h3
                    class="header-title text-4xl font-black text-white mb-2 tracking-tight neon-text-white uppercase italic">
                    Catalog Games</h3>
                <p id="total-games" class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em]">0 Games loaded
                </p>
            </div>

            <!-- Games Grid -->
            <div id="library-games" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-1.5 md:gap-2">
                <!-- Game Cards will be injected here by dashboard.js -->
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-500">
                    <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4">
                    </div>
                    <p>Loading your library...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination-controls" class="mt-8 flex justify-center items-center gap-4">
                <button id="prev-btn"
                    class="h-10 px-4 rounded-lg bg-[#1e292b] border border-[#333333] hover:bg-[#253235] text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">arrow_back</span> Previous
                </button>
                <span id="page-info" class="text-slate-400 font-mono text-sm">Page 1 of 1</span>
                <button id="next-btn"
                    class="h-10 px-4 rounded-lg bg-[#1e292b] border border-[#333333] hover:bg-[#253235] text-slate-300 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
                    Next <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>

            <!-- Footer -->
            <footer class="mt-12 py-6 border-t border-[#1e293b] text-center">
                <p class="text-xs text-slate-600">© 2026 N3M Library.</p>
            </footer>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="../../Auth/Js/auth.js"></script>
    <script src="../../Shared/Js/notifications.js"></script>
    <script src="../Js/dashboard.js"></script>
    <script>
        // Ensure notification system is initialized for dashboard
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof isLoggedIn === 'function' && isLoggedIn() && typeof initNotificationSystem === 'function') {
                initNotificationSystem();
            }
        });
    </script>
</body>

</html>
