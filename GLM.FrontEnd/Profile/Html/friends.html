<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Friends - N3M|Nest</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet"/>
    <link rel="stylesheet" href="../../Assets/tailwind.css">
    <style>
        :root {
            --color-primary: 0 242 255;
            --color-deep-teal: 10 26 27;
            --color-cyber-cyan: 0 242 255;
            --color-glass-bg: 255 255 255;
            --color-status-online: 16 185 129;
        }

        body {
            background-color: #0a1a1b;
            background-image: radial-gradient(circle at 50% 50%, #132d2f 0%, #0a1a1b 100%);
            color: #e2e8f0;
            font-family: "Rajdhani", sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hex-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(0, 242, 255, 0.09) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(circle at center, black 20%, transparent 95%);
        }

        .glow-text {
            text-shadow: 0 2px 6px rgba(0, 242, 255, 0.35), 0 0 14px rgba(0, 242, 255, 0.25);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .cyber-btn {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: transform 0.2s ease;
        }

        .cyber-btn:hover {
            transform: scale(1.02);
        }

        /* Hide header until fonts are loaded — prevents icon/text FOUC on navigation */
        html:not(.fonts-loaded) header { opacity: 0; }
        html.fonts-loaded header { opacity: 1; transition: opacity 0.2s ease; }
    </style>
</head>
<body class="relative h-full">
    <div class="hex-bg"></div>

    <header class="relative z-40 px-4 sm:px-8 py-6 flex items-center justify-between">
        <button onclick="goBackToProfile()" class="flex items-center gap-2 text-cyber-cyan hover:text-white transition-colors duration-300 font-orbitron text-xs sm:text-sm tracking-widest uppercase">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            Back To Profile
        </button>

        <div class="relative z-[450]" id="notif-wrapper">
            <button id="notification-btn" onclick="toggleNotifDropdown()"
                class="glass-panel h-12 w-12 rounded-full flex items-center justify-center text-cyber-cyan hover:text-white transition-all group overflow-visible relative">
                <span class="material-symbols-outlined text-[22px] relative z-10 transition-transform group-hover:scale-110">notifications</span>
                <span id="notif-badge" class="hidden absolute -top-1 -right-1 h-5 w-5 rounded-full bg-cyber-cyan text-deep-teal text-[10px] font-black flex items-center justify-center z-20 shadow-[0_0_8px_rgba(0,242,255,0.8)] animate-pulse">0</span>
            </button>

            <div id="notif-dropdown" class="hidden absolute top-[calc(100%+10px)] right-0 w-80 bg-[#0a1618] border border-cyber-cyan/20 rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.8)] z-[500] overflow-hidden backdrop-blur-xl">
                <div class="px-5 py-4 border-b border-cyber-cyan/15 flex items-center justify-between">
                    <h3 class="text-xs font-orbitron text-cyber-cyan uppercase tracking-widest">Friend Requests</h3>
                    <span id="notif-count-label" class="text-[10px] text-slate-500"></span>
                </div>
                <div id="notif-list" class="overflow-y-auto" style="max-height:360px;scrollbar-width:thin;scrollbar-color:#1e293b transparent"></div>
                <div id="notif-empty" class="hidden px-5 py-8 flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined text-3xl text-slate-700">notifications_off</span>
                    <p class="text-xs font-orbitron text-slate-500 uppercase tracking-wider">No pending requests</p>
                </div>
            </div>
        </div>
    </header>

    <main class="relative z-10 container mx-auto px-4 sm:px-8 pb-12">
        <section class="mb-10 sm:mb-12 flex items-center gap-5 sm:gap-6" data-purpose="user-hero">
            <div class="relative">
                <img id="header-avatar" alt="Profile Avatar" class="w-20 h-20 sm:w-24 sm:h-24 object-cover border-2 border-cyber-cyan/30 rounded-lg shadow-lg shadow-cyber-cyan/20" src="" onerror="this.src='https://ui-avatars.com/api/?name=U&background=0a1a1b&color=00f2ff&size=100'"/>
            </div>
            <div class="min-w-0">
                <h1 id="header-username" class="font-orbitron text-3xl sm:text-5xl font-black text-white glow-text tracking-tight uppercase leading-none break-words">USER</h1>
                <div class="flex items-center gap-2 mt-2">
                    <span id="friends-total-count" class="bg-cyber-cyan text-deep-teal font-bold px-2 py-0.5 text-xs rounded">0</span>
                    <span class="text-cyber-cyan font-orbitron tracking-widest text-xs sm:text-sm uppercase">Friends</span>
                </div>
            </div>
        </section>

        <section class="mb-8 sm:mb-10 flex flex-col md:flex-row gap-4 sm:gap-6 items-stretch md:items-center" data-purpose="controls">
            <div class="relative w-full md:max-w-md">
                <span class="material-symbols-outlined absolute inset-y-0 left-4 flex items-center pointer-events-none text-cyber-cyan/50 text-[20px]">search</span>
                <input id="friends-search" class="w-full bg-glass-bg/5 border border-cyber-cyan/20 text-white rounded-lg py-3 pl-12 pr-4 focus:ring-2 focus:ring-cyber-cyan/50 focus:border-cyber-cyan outline-none transition-all placeholder:text-cyber-cyan/30" placeholder="Search friends..." type="text" oninput="filterFriends()"/>
            </div>
            <button id="open-add-friend" class="cyber-btn bg-cyber-cyan text-deep-teal font-orbitron font-bold py-3 px-8 tracking-wider uppercase md:ml-auto">
                + Add New Friend
            </button>
        </section>

        <section data-purpose="friends-list" class="max-w-5xl">
            <div id="friends-skeleton" class="space-y-4">
                <div class="glass-panel rounded-xl p-5 flex items-center gap-4 opacity-60 animate-pulse">
                    <div class="h-14 w-14 rounded-full bg-cyan-100/5 border border-cyber-cyan/20"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 w-32 bg-cyan-100/10 rounded"></div>
                        <div class="h-2 w-24 bg-cyan-100/10 rounded"></div>
                    </div>
                </div>
                <div class="glass-panel rounded-xl p-5 flex items-center gap-4 opacity-40 animate-pulse">
                    <div class="h-14 w-14 rounded-full bg-cyan-100/5 border border-cyber-cyan/20"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-3 w-28 bg-cyan-100/10 rounded"></div>
                        <div class="h-2 w-20 bg-cyan-100/10 rounded"></div>
                    </div>
                </div>
            </div>

            <div id="friends-list" class="hidden space-y-4"></div>

            <div id="friends-empty" class="hidden glass-panel rounded-xl p-10 sm:p-12 text-center">
                <span class="material-symbols-outlined text-6xl text-cyan-100/30 mb-4">group_off</span>
                <h3 class="text-2xl font-orbitron tracking-widest text-white/70 uppercase mb-2">No Friends Yet</h3>
                <p class="text-white/50 text-base">Use Add New Friend to start connecting.</p>
            </div>

            <div id="no-results" class="hidden glass-panel rounded-xl p-10 text-center">
                <span class="material-symbols-outlined text-5xl text-cyan-100/30 mb-3">search_off</span>
                <p class="text-white/50 font-orbitron text-sm uppercase tracking-wider">No matching friend found</p>
            </div>
        </section>
    </main>

    <footer class="relative z-10 py-12 text-center text-white/25 border-t border-white/5 mx-4 sm:mx-8">
        <p class="font-orbitron text-xs tracking-widest">(c) 2026 N3M LIBRARY. ALL SYSTEMS NOMINAL.</p>
    </footer>

    <div id="add-friend-modal" class="hidden fixed inset-0 z-[500] items-center justify-center px-4">
        <div id="add-friend-backdrop" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-2xl rounded-2xl border border-cyber-cyan/30 bg-[#081416]/95 shadow-[0_30px_90px_rgba(0,0,0,0.7)] p-6 sm:p-7">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-orbitron text-cyber-cyan uppercase tracking-wider text-sm">Add Friend</h3>
                <button id="close-add-friend" class="h-10 w-10 rounded-lg border border-white/20 text-slate-400 hover:text-white hover:border-cyber-cyan transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="relative mb-4">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-cyber-cyan/50 text-[18px] pointer-events-none">search</span>
                <input id="add-friend-search-input" type="text" placeholder="Search by username or display name..."
                    class="w-full h-12 bg-glass-bg/5 border border-cyber-cyan/20 rounded-xl pl-11 pr-4 text-sm text-white placeholder:text-cyber-cyan/30 focus:outline-none focus:border-cyber-cyan transition-colors">
            </div>

            <p id="add-friend-feedback" class="hidden text-xs mb-3"></p>
            <div id="add-friend-results" class="space-y-3 max-h-[430px] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <script src="../../Assets/vendor/signalr/signalr.min.js"></script>
    <script src="../../Auth/Js/auth.js"></script>
    <script src="../../Shared/Js/notifications.js"></script>
    <script src="../Js/friends.js"></script>
</body>
</html>
