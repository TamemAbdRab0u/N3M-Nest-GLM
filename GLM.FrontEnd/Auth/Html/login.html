<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Authentication - N3M|Nest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a7dff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2023",
                        "surface-dark": "#121212",
                        "input-bg": "#1e292b",
                        "input-border": "#2e616b",
                        "error": "#ff4757",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .btn-loader { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-message {
            display: none;
            padding: 12px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .error-message.show { display: block; }

        /* Slide Transition Classes */
        .auth-container {
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .show-register .auth-container {
            transform: translateX(-50%);
        }
        
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased h-screen w-full overflow-hidden flex flex-col md:flex-row">
    <!-- Left Side: Hero Image -->
    <div class="relative hidden w-full md:flex md:w-1/2 h-full bg-cover bg-center" style="background-image: url('../../Assets/Images/Bg1.jpg');">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0f2023] via-transparent to-transparent opacity-90"></div>
    </div>

    <!-- Right Side: Auth Forms Container (Viewport) -->
    <div class="w-full md:w-1/2 h-full relative overflow-hidden bg-[#121212] dark:bg-[#121212] text-white">
        
        <!-- Sliding Container (Holds both forms side-by-side) -->
        <div id="auth-slider" class="auth-container flex w-[200%] h-full">
            
            <!-- Login Section (50% width) -->
            <div class="w-1/2 h-full flex flex-col overflow-y-auto">
                <div class="flex-1 flex flex-col justify-center px-8 sm:px-12 lg:px-24 py-12">
                    <!-- Header -->
                    <div class="mb-10">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="h-12 w-auto flex items-center justify-center">
                                <img src="../../Assets/Images/logo.png" alt="N3M Logo" class="h-full object-contain filter drop-shadow-[0_0_10px_rgba(74,125,255,0.3)]">
                            </div>
                            <span class="font-bold text-2xl tracking-wide">N3M<span style="color: rgb(188 207 255);text-shadow: 0px 0px 10px #366fe9;" class="text-primary text-3xl mx-1">|</span>Nest</span>
                        </div>
                        <h2 class="text-3xl font-bold tracking-tight text-white mb-2">Welcome Back</h2>
                        <p class="text-slate-400">Enter your credentials to access your collection.</p>
                    </div>

                    <!-- Error Message Container (Login) -->
                    <div id="login-error-message" class="error-message"></div>

                    <!-- Main Form -->
                    <form id="login-form" class="flex flex-col gap-5">
                        <!-- Email Input -->
                        <label class="flex flex-col gap-2">
                            <span class="text-sm font-medium text-slate-300">Email Address</span>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">mail</span>
                                </div>
                                <input id="email" name="email" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="player1@example.com" type="email" required/>
                            </div>
                        </label>

                        <!-- Password Input -->
                        <label class="flex flex-col gap-2">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-medium text-slate-300">Password</span>
                                <a class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
                            </div>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">lock</span>
                                </div>
                                <input id="password" name="password" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-10 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="••••••••" type="password" required/>
                                <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 cursor-pointer toggle-password" onclick="togglePassword('password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </label>

                        <!-- Action Button -->
                        <button id="login-btn" class="btn-submit mt-2 w-full h-12 bg-primary hover:bg-primary/90 text-[#ffffff] font-bold rounded-lg shadow-lg shadow-primary/20 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                            <span class="btn-text flex items-center gap-2">Log In <span class="material-symbols-outlined text-[20px]">arrow_forward</span></span>
                            <div class="btn-loader"></div>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-[#333333]"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-[#121212] text-slate-500">Or continue with</span>
                        </div>
                    </div>

                    <!-- Social Logins -->
                    <div class="grid grid-cols-3 gap-3">
                        <button class="flex flex-col items-center justify-center gap-2 h-20 rounded-lg border border-[#333333] bg-[#1e1e1e] hover:bg-[#252525] hover:border-primary/50 transition-all group">
                            <i class="fab fa-discord text-2xl text-[#5865F2]"></i>
                        </button>
                        <button class="flex flex-col items-center justify-center gap-2 h-20 rounded-lg border border-[#333333] bg-[#1e1e1e] hover:bg-[#252525] hover:border-primary/50 transition-all group">
                            <i class="fab fa-steam text-2xl text-white"></i>
                        </button>
                        <button class="flex flex-col items-center justify-center gap-2 h-20 rounded-lg border border-[#333333] bg-[#1e1e1e] hover:bg-[#252525] hover:border-primary/50 transition-all group">
                            <i class="fab fa-twitch text-2xl text-[#9146FF]"></i>
                        </button>
                    </div>

                    <!-- Footer Signup -->
                    <div class="mt-10 text-center">
                        <p class="text-slate-400">
                            Don't have an account? 
                            <button type="button" class="font-bold text-white hover:text-primary transition-colors" onclick="toggleAuthView('register')">Sign up for free</button>
                        </p>
                    </div>
                </div>
                
                <!-- Bottom Disclaimer -->
                <div class="p-6 text-center">
                    <p class="text-xs text-slate-600">© 2026 N3M Library. All rights reserved.</p>
                </div>
            </div>

            <!-- Register Section (50% width) -->
            <div class="w-1/2 h-full flex flex-col overflow-y-auto">
                <div class="flex-1 flex flex-col justify-center px-8 sm:px-12 lg:px-24 py-12">
                    <!-- Header -->
                    <div class="mb-8">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="h-12 w-auto flex items-center justify-center">
                                <img src="../../Assets/Images/logo.png" alt="N3M Logo" class="h-full object-contain filter drop-shadow-[0_0_10px_rgba(74,125,255,0.3)]">
                            </div>
                            <span class="font-bold text-2xl tracking-wide">N3M<span class="text-primary text-3xl mx-1">|</span>Nest</span>
                        </div>
                        <h2 class="text-3xl font-bold tracking-tight text-white mb-2">Create Account</h2>
                        <p class="text-slate-400">Join us to start managing your game library.</p>
                    </div>

                    <!-- Error Message Container (Register) -->
                    <div id="register-error-message" class="error-message"></div>

                    <!-- Main Form -->
                    <form id="register-form" class="flex flex-col gap-4">
                        <div class="grid grid-cols-2 gap-4">
                            <!-- First Name -->
                            <label class="flex flex-col gap-2">
                                <span class="text-sm font-medium text-slate-300">First Name</span>
                                <input id="firstName" name="firstName" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] px-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="John" type="text" required/>
                            </label>
                            <!-- Last Name -->
                            <label class="flex flex-col gap-2">
                                <span class="text-sm font-medium text-slate-300">Last Name</span>
                                <input id="lastName" name="lastName" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] px-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="Doe" type="text" required/>
                            </label>
                        </div>

                        <!-- Username -->
                        <label class="flex flex-col gap-2">
                            <span class="text-sm font-medium text-slate-300">Username</span>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">alternate_email</span>
                                </div>
                                <input id="userName" name="userName" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="GamerTag24" type="text" required/>
                            </div>
                        </label>

                        <!-- Email Input -->
                        <label class="flex flex-col gap-2">
                            <span class="text-sm font-medium text-slate-300">Email Address</span>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">mail</span>
                                </div>
                                <input id="reg-email" name="email" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="player1@example.com" type="email" required/>
                            </div>
                        </label>

                        <!-- Password Input -->
                        <label class="flex flex-col gap-2">
                            <span class="text-sm font-medium text-slate-300">Password</span>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">lock</span>
                                </div>
                                <input id="reg-password" name="password" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-10 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="••••••••" type="password" required/>
                                <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 cursor-pointer toggle-password" onclick="togglePassword('reg-password')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </label>

                        <!-- Confirm Password -->
                        <label class="flex flex-col gap-2">
                            <span class="text-sm font-medium text-slate-300">Confirm Password</span>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">lock_reset</span>
                                </div>
                                <input id="confirmPassword" name="confirmPassword" class="w-full h-12 rounded-lg bg-[#1e1e1e] border border-[#333333] pl-10 pr-10 text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" placeholder="••••••••" type="password" required/>
                            </div>
                        </label>
                        
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" id="terms" name="terms" class="rounded border-[#333333] bg-[#1e1e1e] text-primary focus:ring-primary">
                            <label for="terms" class="text-sm text-slate-400 select-none">I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a></label>
                        </div>

                        <!-- Action Button -->
                        <button id="register-btn" class="btn-submit mt-2 w-full h-12 bg-primary hover:bg-primary/90 text-[#ffffff] font-bold rounded-lg shadow-lg shadow-primary/20 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                            <span class="btn-text flex items-center gap-2">Create Account <span class="material-symbols-outlined text-[20px]">person_add</span></span>
                            <div class="btn-loader"></div>
                        </button>
                    </form>

                    <!-- Footer Login -->
                    <div class="mt-8 text-center">
                        <p class="text-slate-400">
                            Already have an account? 
                            <button type="button" class="font-bold text-white hover:text-primary transition-colors" onclick="toggleAuthView('login')">Log In</button>
                        </p>
                    </div>
                </div>
                
                <!-- Bottom Disclaimer -->
                <div class="p-6 text-center">
                    <p class="text-xs text-slate-600">© 2026 N3M Library. All rights reserved.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../../Auth/Js/auth.js"></script>
    <script>
        // Init both forms
        initLoginPage();
        initRegisterPage();

        // Handle view toggling
        function toggleAuthView(view) {
            const body = document.body;
            if (view === 'register') {
                body.classList.add('show-register');
                window.location.hash = 'register';
            } else {
                body.classList.remove('show-register');
                window.location.hash = 'login';
            }
        }
        
        // Handle initial hash check if user navigates to #register
        function checkHash() {
            if(window.location.hash === '#register') {
                toggleAuthView('register');
            } else {
                toggleAuthView('login');
            }
        }
        
        window.addEventListener('load', checkHash);
        window.addEventListener('hashchange', checkHash);
    </script>
</body>
</html>
